name: 全てのステップ (Update, Generate and Upload)

on:
  workflow_dispatch:
  schedule:
    - cron: 0 17 * * *

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Update database
        run: |
          curl -sSL -X POST \
            -H "Content-type:application/json" \
            --data '{"user_id":"${{ secrets.ES_BASIC_ID }}", "passwd":"${{ secrets.ES_BASIC_PASS }}"}' \
            --max-time 900 \
            -w "\n---\nHTTP_STATUS: %{http_code}\nTIME_TOTAL: %{time_total}s\n" \
            ${{ secrets.UPDATE_ENDPOINT }} \
            > update_result.txt 2>&1 \
            || echo "curl_exit_code: $?" >> update_result.txt
          cat update_result.txt
      - name: Upload DB update result
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: db-update-result-${{ github.run_id }}
          path: update_result.txt
          retention-days: 7
      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: "16.x"
      - name: Install dependencies
        run: npm i
      - name: Nuxt generate
        run: npm run generate
      - uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "ap-northeast-1"
          SOURCE_DIR: "togotv"
